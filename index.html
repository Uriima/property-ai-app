<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property AI Estimator</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<link rel="stylesheet" href="style.css">

<script>
if ('serviceWorker' in navigator) {
window.addEventListener('load', function() {
navigator.serviceWorker.register('service-worker.js')
.then(function(registration) {
console.log('Service Worker registered', registration);
})
.catch(function(error) {
console.log('Service Worker registration failed', error);
});
});
}
</script>

</head>

<body>

<div class="container">

<h1>Property AI Estimator</h1>

<!-- STATE -->
<div class="form-group">
<label>State</label>
<select id="city">
<option value="">Select State</option>
</select>
</div>

<!-- LGA -->
<div class="form-group">
<label>LGA</label>
<select id="area">
<option value="">Select LGA</option>
</select>
</div>

<!-- BEDROOMS -->
<div class="form-group">
<label>Bedrooms</label>
<input type="number" id="bedrooms" placeholder="Enter number of bedrooms">
</div>

<!-- IMAGE UPLOAD -->
<div class="form-group">

<label>Property Photos (Max 5)</label>

<br><br>

<button type="button" onclick="openCamera()">📷 Take Photo</button>

<button type="button" onclick="openGallery()">🖼 Choose From Gallery</button>

<br><br>

<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
multiple
style="display:none"
>

<input
type="file"
id="galleryInput"
accept="image/*"
multiple
style="display:none"
>

<p class="hint">
Upload up to 5 photos of the building for better AI estimation.
</p>

</div>

<!-- RESULT -->
<button onclick="estimate()">Estimate Property Value</button>

<div id="result" style="margin-top:20px;font-weight:bold;"></div>

</div>

<script src="app.js"></script>

<script>

function openCamera(){
document.getElementById("cameraInput").click();
}

function openGallery(){
document.getElementById("galleryInput").click();
}

</script>

</body>
</html>
