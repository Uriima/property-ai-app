<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Property Value Estimator</title>
  <link rel="manifest" href="manifest.json">
  <script src="app.js" defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 20px auto;
      padding: 10px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
    }

    #image-input {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h2>AI Property Value Estimator</h2>

  <input id="city" placeholder="City" type="text">
  <input id="area" placeholder="Area" type="text">
  <input id="bedrooms" placeholder="Bedrooms" type="number">

  <div id="image-input">
    <label>Select up to 5 photos of the building:</label>
    <input type="file" id="images" accept="image/*" capture="environment" multiple>
  </div>

  <button onclick="estimate()">Estimate Value</button>

  <p id="result"></p>

</body>

</html>
