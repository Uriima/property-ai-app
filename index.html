<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Property Valuation</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>AI Property Valuation</h1>

  <form id="estimateForm" onsubmit="event.preventDefault(); estimate();">
    <label for="city">State:</label>
    <select id="city" required>
      <option value="">--Select State--</option>
    </select>

    <label for="area">Area / LGA:</label>
    <select id="area" required>
      <option value="">--Select Area--</option>
    </select>

    <label for="bedrooms">Number of Bedrooms:</label>
    <input type="number" id="bedrooms" min="1" max="20" required>

    <label for="images">Upload Photos (up to 5):</label>
    <input type="file" id="images" accept="image/*" multiple capture="environment">

    <button type="submit">Estimate Value</button>
  </form>

  <div id="result" style="margin-top:20px;font-weight:bold;"></div>

  <script src="app.js"></script>
</body>
</html>
