<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Property Estimator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    select, input, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #result {
      margin-top: 20px;
      padding: 10px;
      border-radius: 5px;
      background: #fff;
      border: 1px solid #ccc;
      min-height: 40px;
    }
    .image-buttons {
      display: flex;
      gap: 10px;
    }
    .image-buttons button {
      flex: 1;
    }
  </style>
</head>
<body>

  <h1>AI Property Estimator</h1>

  <label for="city">State</label>
  <select id="city">
    <option value="">--Select State--</option>
  </select>

  <label for="area">Area / LGA</label>
  <select id="area">
    <option value="">--Select Area--</option>
  </select>

  <label for="bedrooms">Bedrooms</label>
  <input type="number" id="bedrooms" min="0" placeholder="Number of bedrooms">

  <div class="image-buttons">
    <button type="button" id="cameraBtn">Take Photo</button>
    <button type="button" id="galleryBtn">Upload from Gallery</button>
  </div>

  <input id="images" type="file" multiple style="display:none;" accept="image/*">

  <button type="button" onclick="estimate()">Estimate Value</button>

  <div id="result"></div>

  <script src="app.js"></script>

</body>
</html>
