<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property AI Estimator</title>

<!-- PWA Manifest -->

<link rel="manifest" href="manifest.json">

<!-- Theme Color -->

<meta name="theme-color" content="#0d6efd">

<!-- App Icon -->

<link rel="icon" href="icons/icon-192x192.png">

<!-- Optional CSS -->

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Property AI Estimator</h1>

<!-- STATE SELECT -->

<div class="form-group">
<label for="city">State:</label>

<select id="city">
<option value="">--Select State--</option>
</select>

</div>

<!-- LGA SELECT -->

<div class="form-group">
<label for="area">LGA:</label>

<select id="area">
<option value="">--Select Area--</option>
</select>

</div>

<!-- BEDROOM INPUT -->

<div class="form-group">

<label for="bedrooms">Bedrooms:</label>

<input
type="number"
id="bedrooms"
min="1"
max="10"
placeholder="Number of bedrooms"

>

</div>

<!-- IMAGE UPLOAD -->

<div class="form-group">

<label>Upload Property Photos (Maximum 5)</label> <br>

<input
type="file"
id="images"
accept="image/*"
multiple
capture="environment"

>

<p class="hint">
On mobile you can use the camera or choose images from your gallery.
</p>

</div>

<!-- ESTIMATE BUTTON -->

<button onclick="estimate()">
Estimate Property Value
</button>

<!-- RESULT AREA -->

<div id="result" style="margin-top:20px;font-weight:bold;"></div>

</div>

<!-- MAIN APPLICATION SCRIPT -->

<script src="app.js"></script>

<!-- SERVICE WORKER -->

<script>

if ('serviceWorker' in navigator) {

window.addEventListener('load', function () {

navigator.serviceWorker.register('/service-worker.js')
.then(function(registration) {

console.log("Service Worker registered:", registration);

})
.catch(function(error) {

console.log("Service Worker registration failed:", error);

});

});

}

</script>

</body>

</html>
